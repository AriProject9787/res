<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.8);
            --error-color: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract shapes in background */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(118, 75, 162, 0.6);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: rgba(102, 126, 234, 0.5);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.05); }
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            z-index: 1;
            transition: all 0.4s ease;
        }

        .container.expanded {
            max-width: 800px;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        /* Adjust date picker icon color */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.7;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .result-section {
            display: none;
            margin-top: 2rem;
            text-align: center;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-image-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 1.5rem;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .result-image {
            max-width: 100%;
            border-radius: 8px;
            display: none; /* Initially hidden */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            margin-top: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .not-found {
            display: none;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .not-found svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.5);
        }

    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container" id="mainCard">
        <div id="formSection">
            <div class="header">
                <h1>Student Portal</h1>
                <p>Check your exam results via registration number</p>
            </div>

            <form id="resultForm">
                <div class="form-group">
                    <label for="regNum">Registration Number (12 digits)</label>
                    <input type="text" id="regNum" class="form-control" placeholder="e.g. 123456789012" maxlength="12" pattern="\d{12}" required>
                    <div class="error-msg" id="regError">Please enter exactly 12 digits.</div>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" class="form-control" required>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">View Result</button>
            </form>
        </div>

        <div class="result-section" id="resultSection">
            <div class="header">
                <h1>Result Published</h1>
                <p id="resultInfo">Showing results for: </p>
            </div>
            
            <div class="loader" id="loader"></div>

            <div class="result-image-container">
                <div class="not-found" id="notFound">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p>No result found for this Registration Number.</p>
                </div>
                <img id="resultImage" class="result-image" alt="Exam Result">
            </div>

            <button class="btn-back" id="backBtn">Search Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('resultForm');
            const regInput = document.getElementById('regNum');
            const regError = document.getElementById('regError');
            
            const formSection = document.getElementById('formSection');
            const resultSection = document.getElementById('resultSection');
            const mainCard = document.getElementById('mainCard');
            
            const resultInfo = document.getElementById('resultInfo');
            const resultImage = document.getElementById('resultImage');
            const notFound = document.getElementById('notFound');
            const loader = document.getElementById('loader');
            const backBtn = document.getElementById('backBtn');

            // Allow only numbers in input
            regInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
                if (this.value.length === 12) {
                    regError.style.display = 'none';
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const regNum = regInput.value.trim();
                const dob = document.getElementById('dob').value;

                if (regNum.length !== 12) {
                    regError.style.display = 'block';
                    // Shake animation for error
                    form.style.transform = 'translateX(-10px)';
                    setTimeout(() => form.style.transform = 'translateX(10px)', 100);
                    setTimeout(() => form.style.transform = 'translateX(-10px)', 200);
                    setTimeout(() => form.style.transform = 'translateX(0)', 300);
                    return;
                }

                regError.style.display = 'none';

                // Display loading state
                formSection.style.display = 'none';
                resultSection.style.display = 'block';
                mainCard.classList.add('expanded');
                
                resultInfo.textContent = `Registration Number: ${regNum} | DOB: ${dob}`;
                
                // Hide existing image/errors and show loader
                resultImage.style.display = 'none';
                notFound.style.display = 'none';
                loader.style.display = 'block';

                let imgPathJpg, imgPathPng;

                // <input type="date"> always returns values in YYYY-MM-DD format
                if (regNum === '950422104004' && dob === '2004-07-08') {
                    imgPathJpg = `image/${regNum}.png`;
                    imgPathPng = null;
                } else {
                    alert('No result found for this Registration Number.');
                    loader.style.display = 'none';
                    notFound.style.display = 'block';
                    return; // Stop execution here
                }

                const tryLoadImage = (src, fallbackSrc) => {
                    const img = new Image();
                    img.onload = () => {
                        loader.style.display = 'none';
                        resultImage.src = src;
                        resultImage.style.display = 'block';
                    };
                    img.onerror = () => {
                        if (fallbackSrc) {
                            tryLoadImage(fallbackSrc, null);
                        } else {
                            // Both failed
                            loader.style.display = 'none';
                            notFound.style.display = 'block';
                        }
                    };
                    img.src = src;
                };

                // Add slight artificial delay for smooth transition feel
                setTimeout(() => {
                    tryLoadImage(imgPathJpg, imgPathPng);
                }, 800);
            });

            backBtn.addEventListener('click', () => {
                resultSection.style.display = 'none';
                formSection.style.display = 'block';
                mainCard.classList.remove('expanded');
            });
        });
    </script>
</body>
</html>
